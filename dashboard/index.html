<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monitor Dashboard</title>
  <link rel="stylesheet" href="css/dashboard.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <header>
    <h1>🖥️ Monitor Dashboard</h1>
    <span id="last-update">Atualizando...</span>
  </header>

  <section class="stats-grid" id="stats"></section>

  <section class="panel">
    <h2>Serviços</h2>
    <table id="services-table">
      <thead><tr><th>Serviço</th><th>Tipo</th><th>Status</th><th>Atualizado</th></tr></thead>
      <tbody></tbody>
    </table>
  </section>

  <section class="panel">
    <h2>Histórico de Resposta (último serviço selecionado)</h2>
    <canvas id="response-chart" height="80"></canvas>
  </section>

  <section class="panel">
    <h2>Alertas Ativos</h2>
    <table id="alerts-table">
      <thead><tr><th>Serviço</th><th>Severidade</th><th>Mensagem</th><th>Criado</th><th>Ação</th></tr></thead>
      <tbody></tbody>
    </table>
  </section>

  <script src="js/charts.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
